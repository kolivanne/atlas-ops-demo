name: Project Governance Automation
on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  governance:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Acknowledge New Issue
        if: github.event.action == 'opened'
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Thanks for opening this issue! Our team will review it and follow up if needed."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI Compliance Check
        if: github.event.action == 'labeled' && github.event.label.name == 'ai-request'
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Compliance Trigger: This request involves AI tooling. Please confirm that the data handling steps align with our internal AI Policy."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}