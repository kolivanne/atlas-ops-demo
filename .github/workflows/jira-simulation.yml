name: Project Governance Automation
on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write

jobs:
  triage-and-security:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Acknowledge New Issue
        if: github.event.action == 'opened'
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Internal Process Note: This request has been logged. Our tooling team will review the requirements for stack compatibility."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: AI Compliance Check
        if: >
          (github.event.action == 'labeled' && github.event.label.name == 'ai-request') ||
          (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'ai-request'))
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Compliance Trigger: This request involves AI tooling. Please confirm that the data handling steps align with our internal AI Policy."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}